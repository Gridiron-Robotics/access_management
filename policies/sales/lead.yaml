# Sales / CRM module -> Leads.
# Reps manage their own leads, managers can reassign any lead, admins do anything.
---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  resource: "sales:lead"
  version: "default"
  importDerivedRoles:
    - common_erp_roles
  rules:
    - actions: ["view", "create"]
      effect: EFFECT_ALLOW
      roles: ["sales_rep", "sales_manager"]

    # A rep can update a lead only if they own it.
    - actions: ["update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["owner"]

    - actions: ["update", "reassign"]
      effect: EFFECT_ALLOW
      roles: ["sales_manager"]

    - actions: ["*"]
      effect: EFFECT_ALLOW
      roles: ["admin"]
